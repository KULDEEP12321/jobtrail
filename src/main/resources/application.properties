spring.application.name=jobtrail
server.port=8080

# H2 in-memory database (Phase 1; will swap for Postgres in Phase 3)
spring.datasource.url=jdbc:h2:mem:jobtrail
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actuator: expose health endpoint
management.endpoints.web.exposure.include=health,info
